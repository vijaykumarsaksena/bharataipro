<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot — BharatAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --saffron:#FF6B00; --green:#00A86B; --dark:#0A0A0A; --dark2:#141414; --dark3:#1E1E1E; --white:#FAFAF7; --border:rgba(255,107,0,0.18); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans Devanagari',sans-serif; background:var(--dark); color:var(--white); height:100vh; display:flex; flex-direction:column; }
nav { padding:12px 20px; display:flex; align-items:center; justify-content:space-between; background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); flex-shrink:0; }
.logo { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; color:var(--saffron); text-decoration:none; }
.logo span { color:var(--white); }
.nav-links { display:flex; gap:8px; }
.nav-links a { color:rgba(250,250,247,0.6); text-decoration:none; font-size:0.82rem; padding:5px 12px; border-radius:7px; border:1px solid rgba(255,255,255,0.1); }

.chat-container { flex:1; display:flex; flex-direction:column; max-width:800px; width:100%; margin:0 auto; padding:0 16px; overflow:hidden; }

.chat-header { padding:16px 0 12px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:16px; flex-shrink:0; }
.chat-header h2 { font-family:'Baloo 2',cursive; font-size:1.3rem; font-weight:700; }
.chat-header p { font-size:0.8rem; color:rgba(250,250,247,0.45); margin-top:2px; }
.chat-status { display:inline-flex; align-items:center; gap:6px; font-size:0.75rem; color:var(--green); margin-top:6px; }
.chat-status .dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.messages { flex:1; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:12px; }
.messages::-webkit-scrollbar { width:4px; }
.messages::-webkit-scrollbar-track { background:transparent; }
.messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

.msg { display:flex; gap:10px; max-width:85%; }
.msg.user { flex-direction:row-reverse; align-self:flex-end; }
.msg-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.bot-avatar { background:linear-gradient(135deg,var(--saffron),#FF8C38); }
.user-avatar { background:rgba(255,255,255,0.1); }
.msg-bubble { padding:10px 14px; border-radius:14px; font-size:0.88rem; line-height:1.6; }
.bot-bubble { background:var(--dark2); border:1px solid rgba(255,255,255,0.08); border-radius:4px 14px 14px 14px; }
.user-bubble { background:var(--saffron); color:#fff; border-radius:14px 4px 14px 14px; }
.msg-time { font-size:0.68rem; color:rgba(250,250,247,0.3); margin-top:4px; }

.typing { display:flex; gap:4px; align-items:center; padding:10px 14px; background:var(--dark2); border:1px solid rgba(255,255,255,0.08); border-radius:4px 14px 14px 14px; width:fit-content; }
.typing span { width:6px; height:6px; background:rgba(250,250,247,0.4); border-radius:50%; animation:typing 1.2s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes typing { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-4px);opacity:1} }

.quick-replies { display:flex; gap:8px; flex-wrap:wrap; padding:8px 0; flex-shrink:0; }
.quick-reply { background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.25); color:var(--saffron); padding:6px 14px; border-radius:100px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:'Noto Sans Devanagari',sans-serif; }
.quick-reply:hover { background:rgba(255,107,0,0.2); }

.input-area { padding:12px 0 16px; flex-shrink:0; border-top:1px solid rgba(255,255,255,0.06); }
.input-row { display:flex; gap:10px; }
.chat-input { flex:1; background:var(--dark2); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; color:var(--white); font-size:0.9rem; font-family:'Noto Sans Devanagari',sans-serif; outline:none; transition:border-color 0.2s; }
.chat-input:focus { border-color:var(--saffron); }
.send-btn { width:46px; height:46px; background:var(--saffron); border:none; border-radius:12px; cursor:pointer; font-size:1.1rem; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { background:#CC5500; transform:scale(1.05); }

.wa-float { position:fixed; bottom:24px; right:24px; z-index:999; }
.wa-float a { width:50px; height:50px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; box-shadow:0 4px 20px rgba(37,211,102,0.4); text-decoration:none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🇮🇳 BharatAI<span>Pro</span></a>
  <div class="nav-links">
    <a href="bharatai-master-dashboard">← Dashboard</a>
    <a href="/">🏠 Home</a>
  </div>
</nav>

<div class="chat-container">
  <div class="chat-header">
    <h2>🤖 AI Chatbot</h2>
    <p>Claude API Powered • Hindi + English</p>
    <div class="chat-status"><span class="dot"></span> Online — 1.2s avg response</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar bot-avatar">🤖</div>
      <div>
        <div class="msg-bubble bot-bubble">नमस्ते! 🙏 मैं BharatAI Pro का AI Assistant हूँ। आप Hindi या English में कुछ भी पूछ सकते हैं। मैं आपके business की हर सवाल का जवाब दूंगा!</div>
        <div class="msg-time">अभी</div>
      </div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply" onclick="sendQuick('BharatAI Pro क्या है?')">BharatAI Pro क्या है?</button>
    <button class="quick-reply" onclick="sendQuick('Pricing क्या है?')">💰 Pricing?</button>
    <button class="quick-reply" onclick="sendQuick('Reseller कैसे बनें?')">🤝 Reseller?</button>
    <button class="quick-reply" onclick="sendQuick('Features बताओ')">⚡ Features</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" class="chat-input" id="userInput" placeholder="कुछ भी पूछें... Hindi या English में" onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="wa-float">
  <a href="https://wa.me/918210684331" target="_blank">💬</a>
</div>

<script>
const systemPrompt = `You are BharatAI Pro's helpful AI assistant for a Hindi AI business platform serving Bihar, UP, Jharkhand in India. 

Key info:
- BharatAI Pro is India's first Hindi AI Business Platform
- Built by Kashyap Digital Service Point, Bihar
- Pricing: Starter ₹9,999/month, Business ₹19,999/month, Enterprise custom
- Features: AI Chatbot, Content Tool, WhatsApp Bot, AI Education, Reseller Portal
- Reseller commission: 20-40%
- Contact: WhatsApp 8210684331

Always respond in Hindi (Devanagari script). Be helpful, friendly, and concise. If asked about pricing or joining, guide them to WhatsApp 8210684331.`;

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('quickReplies').style.display = 'none';
  addMessage(text, 'user');
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: systemPrompt,
        messages:[{role:'user',content:text}]
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'माफ़ करें, कुछ error आया। फिर से try करें।';
    addMessage(reply, 'bot');
  } catch(e) {
    removeTyping();
    addMessage('माफ़ करें, connection में problem है। WhatsApp पर contact करें: 8210684331', 'bot');
  }
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(text, type) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString('hi', {hour:'2-digit', minute:'2-digit'});
  div.innerHTML = `
    <div class="msg-avatar ${type}-avatar">${type==='bot'?'🤖':'👤'}</div>
    <div>
      <div class="msg-bubble ${type}-bubble">${text}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar bot-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}
</script>
</body>
</html>
