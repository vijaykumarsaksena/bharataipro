<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Tool — BharatAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --saffron:#FF6B00; --green:#00A86B; --dark:#0A0A0A; --dark2:#141414; --white:#FAFAF7; --border:rgba(255,107,0,0.18); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans Devanagari',sans-serif; background:var(--dark); color:var(--white); min-height:100vh; }
nav { padding:12px 20px; display:flex; align-items:center; justify-content:space-between; background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; color:var(--saffron); text-decoration:none; }
.logo span { color:var(--white); }
nav a.back { color:rgba(250,250,247,0.6); text-decoration:none; font-size:0.82rem; padding:5px 12px; border-radius:7px; border:1px solid rgba(255,255,255,0.1); }

.page { max-width:900px; margin:0 auto; padding:32px 20px; }
.page-title { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; margin-bottom:6px; }
.page-sub { color:rgba(250,250,247,0.5); font-size:0.88rem; margin-bottom:32px; }

.tool-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:28px; margin-bottom:20px; }
.tool-card h3 { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:700; margin-bottom:16px; }

.type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
@media(max-width:600px) { .type-grid { grid-template-columns:repeat(2,1fr); } }

.type-btn {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:12px; text-align:center; cursor:pointer;
  transition:all 0.2s; font-size:0.82rem; font-family:'Noto Sans Devanagari',sans-serif;
  color:rgba(250,250,247,0.7);
}
.type-btn:hover, .type-btn.selected { background:rgba(255,107,0,0.12); border-color:var(--saffron); color:var(--white); }
.type-btn .icon { font-size:1.4rem; display:block; margin-bottom:4px; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px; color:rgba(250,250,247,0.8); }
.form-group input, .form-group textarea, .form-group select {
  width:100%; padding:11px 14px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  color:var(--white); font-family:'Noto Sans Devanagari',sans-serif; font-size:0.88rem; outline:none;
  transition:border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--saffron); }
.form-group textarea { min-height:80px; resize:vertical; }
.form-group select option { background:var(--dark2); }

.lang-toggle { display:flex; gap:8px; }
.lang-btn { flex:1; padding:9px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(250,250,247,0.6); cursor:pointer; font-family:'Noto Sans Devanagari',sans-serif; font-size:0.85rem; transition:all 0.2s; }
.lang-btn.active { background:var(--saffron); border-color:var(--saffron); color:#fff; font-weight:700; }

.generate-btn { width:100%; padding:14px; background:var(--saffron); border:none; border-radius:10px; color:#fff; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans Devanagari',sans-serif; transition:all 0.2s; margin-top:4px; }
.generate-btn:hover { background:#CC5500; transform:translateY(-1px); }
.generate-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

.output-card { background:var(--dark2); border:1px solid rgba(0,168,107,0.2); border-radius:16px; padding:24px; margin-top:20px; display:none; }
.output-card.show { display:block; }
.output-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.output-header h3 { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:700; color:var(--green); }
.copy-btn { background:rgba(0,168,107,0.12); border:1px solid rgba(0,168,107,0.25); color:var(--green); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.8rem; font-family:'Noto Sans Devanagari',sans-serif; transition:all 0.2s; }
.copy-btn:hover { background:rgba(0,168,107,0.2); }
.output-text { font-size:0.9rem; line-height:1.8; color:rgba(250,250,247,0.85); white-space:pre-wrap; }

.loading { text-align:center; padding:24px; }
.loading-spinner { width:32px; height:32px; border:3px solid rgba(255,107,0,0.2); border-top-color:var(--saffron); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

.stats-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
.mini-stat { background:var(--dark2); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:14px 18px; }
.mini-stat .num { font-family:'Baloo 2',cursive; font-size:1.4rem; font-weight:800; color:var(--saffron); }
.mini-stat .lbl { font-size:0.72rem; color:rgba(250,250,247,0.4); margin-top:2px; }

.wa-float { position:fixed; bottom:24px; right:24px; z-index:999; }
.wa-float a { width:50px; height:50px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; box-shadow:0 4px 20px rgba(37,211,102,0.4); text-decoration:none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">🇮🇳 BharatAI<span>Pro</span></a>
  <a href="bharatai-master-dashboard" class="back">← Dashboard</a>
</nav>

<div class="page">
  <div class="page-title">✍️ AI Content Tool</div>
  <div class="page-sub">Claude API Powered — 6 content types • Hindi + English</div>

  <div class="stats-row">
    <div class="mini-stat"><div class="num">340</div><div class="lbl">Pieces Created</div></div>
    <div class="mini-stat"><div class="num">6</div><div class="lbl">Content Types</div></div>
    <div class="mini-stat"><div class="num">2</div><div class="lbl">Languages</div></div>
  </div>

  <div class="tool-card">
    <h3>📝 Content Type चुनें</h3>
    <div class="type-grid">
      <div class="type-btn selected" onclick="selectType(this,'social')"><span class="icon">📱</span>Social Post</div>
      <div class="type-btn" onclick="selectType(this,'ad')"><span class="icon">📢</span>Ad Copy</div>
      <div class="type-btn" onclick="selectType(this,'blog')"><span class="icon">📰</span>Blog Post</div>
      <div class="type-btn" onclick="selectType(this,'email')"><span class="icon">📧</span>Email</div>
      <div class="type-btn" onclick="selectType(this,'whatsapp')"><span class="icon">💬</span>WhatsApp Msg</div>
      <div class="type-btn" onclick="selectType(this,'product')"><span class="icon">🛍️</span>Product Desc</div>
    </div>

    <div class="form-group">
      <label>Business / Topic बताएं *</label>
      <input type="text" id="topic" placeholder="जैसे: मेरी कपड़े की दुकान, Diwali sale, New product launch...">
    </div>

    <div class="form-group">
      <label>Extra details (optional)</label>
      <textarea id="details" placeholder="कोई खास बात जो content में होनी चाहिए..."></textarea>
    </div>

    <div class="form-group">
      <label>Language</label>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang(this,'hindi')">🇮🇳 हिंदी</button>
        <button class="lang-btn" onclick="setLang(this,'english')">🇬🇧 English</button>
        <button class="lang-btn" onclick="setLang(this,'both')">🌐 दोनों</button>
      </div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateContent()">⚡ Content Generate करें</button>
  </div>

  <div class="output-card" id="outputCard">
    <div class="output-header">
      <h3>✅ Generated Content</h3>
      <button class="copy-btn" onclick="copyContent()">📋 Copy करें</button>
    </div>
    <div class="output-text" id="outputText"></div>
  </div>

  <div class="loading" id="loading" style="display:none;">
    <div class="loading-spinner"></div>
    <p style="font-size:0.88rem; color:rgba(250,250,247,0.5);">AI content बना रहा है...</p>
  </div>
</div>

<div class="wa-float">
  <a href="https://wa.me/918210684331" target="_blank">💬</a>
</div>

<script>
let selectedType = 'social';
let selectedLang = 'hindi';

function selectType(el, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = type;
}

function setLang(el, lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedLang = lang;
}

const typeNames = { social:'Social Media Post', ad:'Ad Copy', blog:'Blog Post', email:'Email', whatsapp:'WhatsApp Message', product:'Product Description' };
const langInstructions = {
  hindi: 'हिंदी में लिखें। Devanagari script use करें।',
  english: 'Write in English.',
  both: 'पहले हिंदी में लिखें, फिर English में। दोनों versions दें।'
};

function generateContent() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('Topic जरूर भरें।'); return; }
  const details = document.getElementById('details').value || 'कोई नहीं';
  const msg = '✍️ BharatAI Pro - Content Tool

Type: ' + typeNames[selectedType] + '
Topic: ' + topic + '
Details: ' + details + '
Language: ' + selectedLang + '

कृपया यह content बनाएं।';
  const waURL = 'https://wa.me/918210684331?text=' + encodeURIComponent(msg);
  document.getElementById('outputText').innerHTML = '✅ आपकी request तैयार है!<br><br><a href="' + waURL + '" target="_blank" style="display:inline-block;background:#25D366;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:8px;">📱 WhatsApp पर Content पाएं</a><br><br><small style="color:#aaa;">हमारी Content Team 2-5 मिनट में आपका content भेजेगी।</small>';
  document.getElementById('outputCard').classList.add('show');
}

function copyContent() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy करें'; }, 2000);
  });
}
</script>
</body>
</html>
